<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gemma 4 · Cloudflare</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #0a0a0b; color: #f6f3ed; display: grid; place-items: center; }
    main { width: min(800px, 100%); height: 100vh; display: grid; grid-template-rows: auto 1fr auto; padding: 24px; }
    header { border-bottom: 1px solid #28282c; padding-bottom: 16px; }
    h1 { font-size: 20px; margin: 0 0 5px; }
    header p { color: #9999a3; font-size: 13px; margin: 0; }
    #chat { overflow-y: auto; padding: 24px 0; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 85%; padding: 12px 15px; border-radius: 16px; line-height: 1.55; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #f48120; color: #17110c; border-bottom-right-radius: 4px; }
    .assistant { align-self: flex-start; background: #1b1b1f; border: 1px solid #2d2d32; border-bottom-left-radius: 4px; }
    form { display: grid; grid-template-columns: 1fr auto; gap: 10px; border-top: 1px solid #28282c; padding-top: 16px; }
    textarea { resize: none; min-height: 50px; max-height: 150px; padding: 13px; border-radius: 12px; border: 1px solid #34343a; background: #17171a; color: inherit; font: inherit; outline: none; }
    textarea:focus { border-color: #f48120; }
    button { border: 0; border-radius: 12px; padding: 0 20px; font-weight: 700; background: #f48120; color: #17110c; cursor: pointer; }
    button:disabled { opacity: .5; cursor: wait; }
  </style>
</head>
<body>
  <main>
    <header><h1>Gemma 4</h1><p>Chạy miễn phí trên Cloudflare Workers AI</p></header>
    <section id="chat"><div class="message assistant">Xin chào! Mình có thể giúp gì cho bạn?</div></section>
    <form id="form">
      <textarea id="input" required placeholder="Nhập tin nhắn…" aria-label="Tin nhắn"></textarea>
      <button id="send">Gửi</button>
    </form>
  </main>
  <script>
    const chat = document.querySelector('#chat');
    const form = document.querySelector('#form');
    const input = document.querySelector('#input');
    const send = document.querySelector('#send');
    const messages = [{ role: 'system', content: 'Bạn là trợ lý AI hữu ích. Trả lời rõ ràng bằng ngôn ngữ người dùng.' }];

    function add(role, content) {
      const element = document.createElement('div');
      element.className = `message ${role}`;
      element.textContent = content;
      chat.append(element);
      chat.scrollTop = chat.scrollHeight;
      return element;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const content = input.value.trim();
      if (!content) return;
      messages.push({ role: 'user', content });
      add('user', content);
      input.value = '';
      send.disabled = true;
      const pending = add('assistant', 'Đang suy nghĩ…');
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ messages }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Yêu cầu thất bại');
        const answer = data.response || data.result?.response || 'Không có phản hồi.';
        pending.textContent = answer;
        messages.push({ role: 'assistant', content: answer });
      } catch (error) {
        pending.textContent = `Lỗi: ${error.message}`;
      } finally {
        send.disabled = false;
        input.focus();
      }
    });

    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
